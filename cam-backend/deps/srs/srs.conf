# SRS Configuration
# Doc: https://ossrs.io/lts/en-us/docs/v6/doc/getting-started

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

# HTTP API - 用于 SRS 管理接口
http_api {
    enabled         on;
    listen          1985;
}

# HTTP Server - 用于 HTTP-FLV 和 HLS 分发
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

# 统计信息
stats {
    network         0;
}

vhost __defaultVhost__ {
    # HLS 配置
    hls {
        enabled         on;
        hls_fragment    10;
        hls_window      60;
        hls_path        ./objs/nginx/html/hls;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
        hls_cleanup     off;
        hls_dispose     0;
    }

    # HTTP-FLV 直播流
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    # DVR 录制 (HLS 落盘由 hls_cleanup off 实现，这里是 FLV 录制备份)
    # dvr {
    #     enabled         off;
    #     dvr_plan        session;
    #     dvr_path        ./objs/nginx/html/dvr/[app]/[stream].[timestamp].flv;
    # }

    # Webhook 回调配置
    http_hooks {
        enabled         on;
        on_connect      http://127.0.0.1:9090/api/v1/srs/on_connect;
        on_close        http://127.0.0.1:9090/api/v1/srs/on_close;
        on_publish      http://127.0.0.1:9090/api/v1/srs/on_publish;
        on_unpublish    http://127.0.0.1:9090/api/v1/srs/on_unpublish;
        on_play         http://127.0.0.1:9090/api/v1/srs/on_play;
        on_stop         http://127.0.0.1:9090/api/v1/srs/on_stop;
        on_dvr          http://127.0.0.1:9090/api/v1/srs/on_dvr;
        on_hls          http://127.0.0.1:9090/api/v1/srs/on_hls;
    }
}
